name: schema-validate

on:
  push:
    branches: [main]
    paths:
      - "tasks/curated/**"
      - "schemas/task.schema.json"
      - ".github/workflows/schema-validate.yml"
  pull_request:
    paths:
      - "tasks/curated/**"
      - "schemas/task.schema.json"
      - ".github/workflows/schema-validate.yml"

permissions:
  contents: read

jobs:
  validate-curated-tasks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install jsonschema
        run: |
          python -m pip install -U pip
          pip install "jsonschema>=4.21"

      - name: Validate tasks/curated/*.jsonl against schemas/task.schema.json
        run: python .github/scripts/validate_tasks.py
