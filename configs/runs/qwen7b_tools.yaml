# =============================================================================
# qwen7b_tools.yaml -- Qwen2.5-7B-Instruct baseline using NATIVE TOOL-CALLING.
#
# Identical to qwen7b_smoke.yaml except `agent.native_tools: true`: the scaffold
# offers the tools natively and consumes the model's structured `tool_calls`
# instead of parsing the ReAct text format. Requires the vLLM server to be
# launched with `--enable-auto-tool-choice --tool-call-parser hermes` (pass
# UB_VLLM_EXTRA to the sbatch). Lets a smaller model write files reliably without
# having to emit a single-line JSON Action Input by hand.
# =============================================================================

id: qwen7b-tools
taskset: tasks/curated/v0_smoke.jsonl
repeats: 1
seeds: [1]

models:
  - id: qwen2.5-7b-instruct-tools
    provider: openai
    model: Qwen/Qwen2.5-7B-Instruct
    base_url_env: VLLM_BASE_URL
    api_key: "EMPTY"
    params:
      temperature: 0.2
      max_tokens: 2048
      seed: 7
    price_per_mtok: { input: 0.0, output: 0.0 }
    retry: { max_attempts: 4, base_delay_s: 2.0, max_delay_s: 30.0 }
    timeout_s: 180.0

oracle:
  id: oracle-qwen7b
  client:
    provider: openai
    model: Qwen/Qwen2.5-7B-Instruct
    base_url_env: VLLM_BASE_URL
    api_key: "EMPTY"
    params: { temperature: 0.3, max_tokens: 768 }
    price_per_mtok: { input: 0.0, output: 0.0 }
    retry: { max_attempts: 4, base_delay_s: 1.5, max_delay_s: 30.0 }
    timeout_s: 120.0
  temperature: 0.3
  persona: non_expert_user
  helpfulness: standard
  hint_budget: 3
  max_level: 4
  proactive_stuck_help: true

agent:
  max_steps: 16
  temperature: 0.2
  native_tools: true          # <-- the difference: structured tool calls

budget:
  max_turns: 16
  max_wall_s: 600.0
  max_tokens: 300000
  max_cost_usd: 5.0
  max_oracle_queries: 8

output_root: ./_runs/qwen7b_tools
